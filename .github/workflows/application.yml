name: Application

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: App

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: App/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest test_app.py -v

  push:
    name: Push to Docker Hub
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./App
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-challenge-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-challenge-app:${{ github.sha }}

  deploy:
    name: Deploy to EC2
    needs: push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy container on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/devops-challenge-app:latest
            docker stop devops-challenge-app || true
            docker rm devops-challenge-app || true
            docker run -d \
              --name devops-challenge-app \
              --restart unless-stopped \
              -p 5000:5000 \
              -e APP_ENV=production \
              --log-driver=awslogs \
              --log-opt awslogs-region=${{ secrets.AWS_REGION }} \
              --log-opt awslogs-group=/devops-challenge/app \
              --log-opt awslogs-create-group=true \
              ${{ secrets.DOCKERHUB_USERNAME }}/devops-challenge-app:latest
